# TokyoNight Storm theme for tmux
# Colors:
#   bg_dark   = #1f2335    bg       = #24283b    bg_highlight = #292e42
#   fg        = #c0caf5    fg_dark  = #a9b1d6    fg_gutter    = #3b4261
#   blue      = #7aa2f7    cyan     = #7dcfff    green   = #9ece6a
#   magenta   = #bb9af7    red      = #f7768e    yellow  = #e0af68
#   orange    = #ff9e64    teal     = #1abc9c    purple  = #9d7cd8

# -- General --
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g escape-time 0
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-clipboard on

# -- Status bar --
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify centre
set -g status-style "bg=#1f2335,fg=#a9b1d6"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#1f2335,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#292e42,nobold]#[fg=#7aa2f7,bg=#292e42] #h #[fg=#292e42,bg=#1f2335]"

# Right: date & time
set -g status-right-length 50
set -g status-right "#[fg=#292e42,bg=#1f2335]#[fg=#7dcfff,bg=#292e42] %d/%m/%y #[fg=#7aa2f7,bg=#292e42]#[fg=#1f2335,bg=#7aa2f7,bold] %H:%M "

# -- Window tabs --
set -g window-status-format "#[fg=#1f2335,bg=#292e42]#[fg=#3b4261,bg=#292e42] #I  #W #[fg=#292e42,bg=#1f2335]"
set -g window-status-current-format "#[fg=#1f2335,bg=#bb9af7]#[fg=#1f2335,bg=#bb9af7,bold] #I  #W #[fg=#bb9af7,bg=#1f2335]"
set -g window-status-separator " "

# -- Pane borders --
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# -- Messages & command line --
set -g message-style "bg=#292e42,fg=#7aa2f7"
set -g message-command-style "bg=#292e42,fg=#7aa2f7"

# -- Mode (copy/choice) --
set -g mode-style "bg=#3b4261,fg=#7dcfff"

# -- Clock --
set -g clock-mode-colour "#7aa2f7"

# -- Window options --
set-window-option -g aggressive-resize off
